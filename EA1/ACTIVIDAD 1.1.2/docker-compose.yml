services:

  apigateway:
    image: moonnnluv/apigateway:v1
    ports:
      - "9090:9090"
    depends_on:
      servicioreservas:
        condition: service_started
      serviciocanchas:
        condition: service_started
    networks:
      - spring-net

  serviciocanchas:
    image: moonnnluv/serviciocanchas:v1
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-canchas:3306/basecancha
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
    depends_on:
      db-canchas:
        condition: service_healthy
    networks:
      - spring-net

  servicioreservas:
    image: moonnnluv/servicioreservas:v1
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-reservas:3306/basereserva
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - CANCHAS_SERVICE_URL=http://serviciocanchas:8081
    depends_on:
      db-reservas:
        condition: service_healthy
    networks:
      - spring-net

  db-canchas:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=basecancha
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - canchas-data:/var/lib/mysql
    networks:
      - spring-net

  db-reservas:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=basereserva
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - reservas-data:/var/lib/mysql
    networks:
      - spring-net

networks:
  spring-net:

volumes:
  canchas-data:
  reservas-data: